<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>부경대 사회복지학 실무역량 짱이다</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Pretendard', sans-serif;
      background:#f8efe8;
      color:#2b2b2b;
      overflow-x:hidden;
    }

    .container{
      width:100%;
      max-width:1200px;
      margin:0 auto;
      padding:24px;
    }

    .hero{
      padding:50px 0 30px;
      position:relative;
    }

    .title{
      font-size:clamp(60px, 10vw, 120px);
      line-height:0.9;
      font-weight:800;
      letter-spacing:-4px;
    }

    .title .green{
      color:#009245;
      display:block;
    }

    .title .orange{
      color:#ff4a14;
      display:block;
    }

    .subtitle{
      margin-top:18px;
      font-size:18px;
      font-weight:600;
      color:#444;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:24px;
      margin-top:50px;
      margin-bottom:50px;
    }

    .card{
      background:white;
      border-radius:32px;
      padding:28px;
      box-shadow:0 8px 25px rgba(0,0,0,0.07);
    }

    .card h2{
      font-size:30px;
      margin-bottom:18px;
      font-weight:800;
      letter-spacing:-1px;
    }

    .emoji{
      font-size:34px;
      margin-bottom:10px;
      display:block;
    }

    .big{
      font-size:48px;
      font-weight:800;
      margin:12px 0;
    }

    .small{
      color:#666;
      line-height:1.7;
      font-size:15px;
    }

    ul{
      margin-top:14px;
      padding-left:18px;
    }

    li{
      margin-bottom:10px;
      line-height:1.5;
      font-size:15px;
    }

    footer{
      text-align:center;
      padding-bottom:40px;
      color:#666;
      font-size:14px;
    }
  </style>
</head>

<body>

  <div class="container">

    <section class="hero">

      <h1 class="title">
        <span class="green">부경대</span>
        <span class="orange">사회복지학</span>
      </h1>

      <p class="subtitle">
        실무역량 짱이다 ✨
      </p>

    </section>

    <section class="grid">

      <div class="card">
        <span class="emoji">☀️</span>
        <h2>오늘의 날씨</h2>

        <div class="big">22°C</div>

        <p class="small">
          부산은 맑고 따뜻한 봄 날씨입니다.
        </p>
      </div>

      <div class="card">
        <span class="emoji">📍</span>
        <h2>부산 이슈</h2>

        <ul>
          <li>북항 재개발 사업 확대</li>
          <li>청년 일자리 정책 추진</li>
          <li>관광 산업 활성화</li>
        </ul>
      </div>

      <div class="card">
        <span class="emoji">🎓</span>
        <h2>부경대 뉴스</h2>

        <ul>
          <li>사회복지 프로그램 운영</li>
          <li>학생 창업 지원 확대</li>
          <li>지역사회 연계 프로젝트</li>
        </ul>
      </div>

      <div class="card">
        <span class="emoji">📊</span>
        <h2>사회복지 통계</h2>

        <div class="big">34%</div>

        <p class="small">
          청년 세대 경제 불안 증가 추세
        </p>
      </div>

    </section>

    <footer>
      © 2026 부경대 사회복지학 실무역량 짱이다
    </footer>

  </div>

</body>
</html>
